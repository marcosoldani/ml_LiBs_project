name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  lint-and-test:
    name: Lint, test, security scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src tests scripts app.py

      - name: Run pytest with coverage
        run: |
          pytest --cov=src --cov=app --cov-report=term-missing \
            --cov-report=xml --cov-fail-under=90 \
            --maxfail=1 --disable-warnings -q

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

      - name: Security scan (bandit, blocking on HIGH)
        run: bandit -r src app.py --severity-level high

      - name: Vulnerability scan (pip-audit, blocking)
        # CI runs on ubuntu-latest (amd64), so the `platform_machine !=
        # "arm64"` line of requirements.txt selects the patched
        # cryptography (>=46.0.6) and pip-audit finds no advisories.
        # If a new CVE is published between releases, the gate goes
        # red — fix the pin or document an explicit allow-list here.
        run: pip-audit -r requirements.txt --strict

  docker-build:
    name: Validate Docker build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: battery-mlops:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
